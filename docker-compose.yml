services:
  ore-analysis:
    build:
      context: .
      dockerfile: Dockerfile
    image: nornik-ore-analysis:latest
    ports:
      - "7860:7860"
    environment:
      PANORAMA_DATA_ROOT: /app/data
      PANORAMA_MODELS_ROOT: /app/models
      TALC_ONNX_MODEL: /app/models/talc_unetpp_effb3_768.onnx
      PANORAMA_BATCH_SIZE: "4"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ./data:/app/data
    runtime: nvidia
    restart: unless-stopped
